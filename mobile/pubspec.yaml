name: trashgo
description: TrashGo — On-Demand Waste Pickup Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Firebase (updated to versions with Swift Package Manager support)
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.2
  firebase_analytics: ^11.1.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # Real-time
  socket_io_client: ^2.0.3+1

  # UI components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  flutter_rating_bar: ^4.0.1
  pin_code_fields: ^8.0.1
  image_picker: ^1.0.7

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.3
  permission_handler: ^11.2.0
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true

  # Swift Package Manager is disabled project-wide so CocoaPods remains the
  # dependency manager for iOS/macOS during the transition period. The plugins
  # below have been updated to versions that support SPM, but SPM integration
  # is intentionally turned off to avoid build instability.
  config:
    enable-swift-package-manager: false

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
